<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChaiShopper</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  body { background: var(--bg-page); }
  #app { min-height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
</head>
<body>
<div id="app"></div>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="menu-locations.jsx"></script>
<script type="text/babel" src="reservation.jsx"></script>
<script type="text/babel" src="ceremonies-location.jsx"></script>
<script type="text/babel">
  const { Navbar } = window.ChaiShopperDesignSystem_69d5ad;

  function App() {
    const [page, setPage] = React.useState('home');
    const [param, setParam] = React.useState(null);
    const go = (p, x = null) => { setPage(p); setParam(x); window.scrollTo({ top: 0 }); };
    const links = [
      { label: 'Меню', href: '#', active: page === 'menu' },
      { label: 'Наши точки', href: '#', active: page === 'locations' },
      { label: 'Церемонии', href: '#', active: false },
    ];
    // route nav clicks
    const navLinks = links.map((l, i) => ({ ...l }));

    const Screen = { home: window.HomeScreen, menu: window.MenuScreen, locations: window.LocationsScreen, reservation: window.ReservationScreen, ceremonies: window.CeremoniesScreen, location: window.LocationPageScreen }[page];

    return (
      <div>
        <ChaiNav page={page} go={go} />
        <Screen go={go} param={param} />
      </div>
    );
  }

  function ChaiNav({ page, go }) {
    const { Navbar } = window.ChaiShopperDesignSystem_69d5ad;
    // Custom click handling by wrapping Navbar links
    return (
      <div onClick={(e) => {
        const t = e.target.closest('a');
        if (!t) return;
        const txt = t.textContent.trim();
        const map = { 'Меню': 'menu', 'Наши точки': 'locations', 'Церемонии': 'ceremonies' };
        if (t.querySelector('span') && txt.startsWith('Chai')) { e.preventDefault(); go('home'); return; }
        if (map[txt]) { e.preventDefault(); go(map[txt]); }
      }}>
        <Navbar
          links={[
            { label: 'Меню', href: '#', active: page === 'menu' },
            { label: 'Наши точки', href: '#', active: page === 'locations' || page === 'location' },
            { label: 'Церемонии', href: '#', active: page === 'ceremonies' },
          ]}
          ctaLabel="Забронировать"
          onCta={() => go('reservation')}
        />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
