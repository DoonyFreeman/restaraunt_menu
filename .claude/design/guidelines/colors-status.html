<!-- @dsCard group="Colors" viewport="700x150" name="Menu tags" subtitle="Earthy semantic colors — veg, spicy, top" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--surface-card);padding:26px;font-family:var(--font-sans);display:flex;gap:12px;align-items:center}
  .tag{display:inline-flex;align-items:center;gap:7px;padding:6px 13px;border-radius:var(--radius-pill);font-size:13px;font-weight:500;letter-spacing:.01em}
  .dot{width:7px;height:7px;border-radius:50%}
</style></head>
<body>
  <span class="tag" style="color:var(--tag-veg-fg);background:var(--tag-veg-bg)"><span class="dot" style="background:var(--tag-veg-fg)"></span>Вегетарианское</span>
  <span class="tag" style="color:var(--tag-spicy-fg);background:var(--tag-spicy-bg)"><span class="dot" style="background:var(--tag-spicy-fg)"></span>Острое</span>
  <span class="tag" style="color:var(--tag-top-fg);background:var(--tag-top-bg)"><span class="dot" style="background:var(--tag-top-fg)"></span>Популярное</span>
</body></html>
