<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-page);padding:26px 28px;font-family:var(--font-sans);display:flex;gap:14px;align-items:flex-end}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .bar{background:var(--accent);border-radius:2px;width:26px}
  .lb{color:var(--text-faint);font-size:11px}
</style></head>
<body>
  <div class="col"><div class="bar" style="height:8px"></div><div class="lb">8</div></div>
  <div class="col"><div class="bar" style="height:12px"></div><div class="lb">12</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="lb">16</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="lb">24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="lb">32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="lb">48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="lb">64</div></div>
  <div class="col"><div class="bar" style="height:96px"></div><div class="lb">96</div></div>
</body></html>
