<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-page);padding:24px 28px;font-family:var(--font-sans)}
  .grid{display:flex;gap:18px}
  .col{flex:1}
  h4{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;margin:0 0 9px}
  .do{color:var(--jade-500)} .dont{color:var(--chili-500)}
  li{color:var(--text-secondary);font-size:14px;line-height:1.7;list-style:none}
  li::before{content:"—  ";color:var(--text-faint)}
  ul{margin:0;padding:0}
</style></head>
<body>
  <div class="grid">
    <div class="col">
      <h4 class="do">Говорим так</h4>
      <ul>
        <li>Искусство чайной паузы</li>
        <li>Медленный настой, долгое послевкусие</li>
        <li>Забронировать стол</li>
      </ul>
    </div>
    <div class="col">
      <h4 class="dont">Избегаем</h4>
      <ul>
        <li>СКИДКИ! Успей! 🔥🐉</li>
        <li>Лучший китайский фастфуд в городе</li>
        <li>Кричащий тон и восклицания</li>
      </ul>
    </div>
  </div>
</body></html>
