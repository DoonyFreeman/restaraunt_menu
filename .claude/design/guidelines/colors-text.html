<!-- @dsCard group="Colors" viewport="700x170" name="Text on dark" subtitle="Cream type hierarchy over the page" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-page);padding:24px;font-family:var(--font-sans)}
  .stack{display:flex;flex-direction:column;gap:10px}
  .line{font-size:19px}
  .tag{font-size:11px;color:var(--text-faint);font-family:var(--font-sans);margin-left:10px;letter-spacing:.02em}
</style></head>
<body>
  <div class="stack">
    <div class="line" style="color:var(--text-primary)">Искусство чайной паузы<span class="tag">primary · #F0EBE1</span></div>
    <div class="line" style="color:var(--text-secondary)">Сдержанность и тишина<span class="tag">secondary · #D8D0C2</span></div>
    <div class="line" style="color:var(--text-muted)">Описание блюда, мелкий текст<span class="tag">muted · #9A8A7B</span></div>
    <div class="line" style="color:var(--accent)">Забронировать стол<span class="tag">accent · #C8A96E</span></div>
  </div>
</body></html>
