<!-- @dsCard group="Colors" viewport="700x190" name="Brand & surfaces" subtitle="Warm black, clay surfaces, oolong gold" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-page);padding:22px;font-family:var(--font-sans)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{width:104px}
  .chip{height:62px;border-radius:var(--radius);border:1px solid var(--border-subtle)}
  .nm{color:var(--text-secondary);font-size:12px;margin-top:7px;font-weight:500}
  .hx{color:var(--text-faint);font-size:11px;font-family:var(--font-sans);letter-spacing:.02em}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="nm">Page</div><div class="hx">#0F0E0C</div></div>
    <div class="sw"><div class="chip" style="background:var(--clay-700)"></div><div class="nm">Clay 700</div><div class="hx">#221E19</div></div>
    <div class="sw"><div class="chip" style="background:var(--clay-600)"></div><div class="nm">Surface</div><div class="hx">#2A2520</div></div>
    <div class="sw"><div class="chip" style="background:var(--clay-500)"></div><div class="nm">Elevated</div><div class="hx">#35302A</div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-500)"></div><div class="nm">Gold</div><div class="hx">#C8A96E</div></div>
    <div class="sw"><div class="chip" style="background:var(--gold-200)"></div><div class="nm">Gold hover</div><div class="hx">#D4BA83</div></div>
  </div>
</body></html>
