<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-page);padding:24px 28px;font-family:var(--font-sans);display:flex;gap:18px;align-items:center}
  .col{display:flex;flex-direction:column;align-items:center;gap:9px}
  .box{width:64px;height:64px;background:var(--surface-card-hover);border:1px solid var(--border-subtle)}
  .lb{color:var(--text-faint);font-size:11px}
</style></head>
<body>
  <div class="col"><div class="box" style="border-radius:2px"></div><div class="lb">sm · 2</div></div>
  <div class="col"><div class="box" style="border-radius:4px"></div><div class="lb">base · 4</div></div>
  <div class="col"><div class="box" style="border-radius:8px"></div><div class="lb">card · 8</div></div>
  <div class="col"><div class="box" style="border-radius:14px"></div><div class="lb">lg · 14</div></div>
  <div class="col"><div class="box" style="border-radius:999px"></div><div class="lb">pill</div></div>
</body></html>
