<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Soft warm-black shadows + gold glow" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-page);padding:34px 28px;font-family:var(--font-sans);display:flex;gap:30px;align-items:center}
  .col{display:flex;flex-direction:column;align-items:center;gap:13px}
  .box{width:120px;height:74px;background:var(--surface-card);border-radius:var(--radius-md)}
  .lb{color:var(--text-faint);font-size:11px}
</style></head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lb">sm</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-card)"></div><div class="lb">card</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-card-hover)"></div><div class="lb">card hover</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-gold-glow)"></div><div class="lb">gold glow</div></div>
</body></html>
